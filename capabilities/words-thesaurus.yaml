naftiko: 1.0.0-alpha2
info:
  label: Words API — Thesaurus
  description: 'Words API Thesaurus surface — 4 operations. Lead operation: Get Word Synonyms. Self-contained Naftiko capability covering one Words API business surface.'
  tags:
  - Words API
  - Thesaurus
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    WORDS_API_KEY: WORDS_API_KEY
capability:
  consumes:
  - type: http
    namespace: words-thesaurus
    baseUri: https://wordsapiv1.p.rapidapi.com
    description: Words API Thesaurus business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.WORDS_API_KEY}}'
      placement: header
    resources:
    - name: word-synonyms
      path: /words/{word}/synonyms
      operations:
      - name: getSynonyms
        method: GET
        description: Get Word Synonyms
        inputParameters:
        - name: word
          in: path
          type: string
          required: true
          description: The English word to look up.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: word-antonyms
      path: /words/{word}/antonyms
      operations:
      - name: getAntonyms
        method: GET
        description: Get Word Antonyms
        inputParameters:
        - name: word
          in: path
          type: string
          required: true
          description: The English word to look up.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: word-similar
      path: /words/{word}/similar
      operations:
      - name: getSimilarTo
        method: GET
        description: Get Words Similar To
        inputParameters:
        - name: word
          in: path
          type: string
          required: true
          description: The English word to look up.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: word-also
      path: /words/{word}/also
      operations:
      - name: getAlso
        method: GET
        description: Get Word Also Used
        inputParameters:
        - name: word
          in: path
          type: string
          required: true
          description: The English word to look up.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: words-thesaurus-rest
    port: 8080
    description: REST adapter for Words API — Thesaurus. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/words/{word}/synonyms
      name: word-synonyms
      description: REST surface for /words/{word}/synonyms.
      operations:
      - method: GET
        name: getSynonyms
        description: Get Word Synonyms
        call: words-thesaurus.getSynonyms
        with:
          word: rest.word
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/words/{word}/antonyms
      name: word-antonyms
      description: REST surface for /words/{word}/antonyms.
      operations:
      - method: GET
        name: getAntonyms
        description: Get Word Antonyms
        call: words-thesaurus.getAntonyms
        with:
          word: rest.word
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/words/{word}/similar
      name: word-similar
      description: REST surface for /words/{word}/similar.
      operations:
      - method: GET
        name: getSimilarTo
        description: Get Words Similar To
        call: words-thesaurus.getSimilarTo
        with:
          word: rest.word
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/words/{word}/also
      name: word-also
      description: REST surface for /words/{word}/also.
      operations:
      - method: GET
        name: getAlso
        description: Get Word Also Used
        call: words-thesaurus.getAlso
        with:
          word: rest.word
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: words-thesaurus-mcp
    port: 9090
    transport: http
    description: MCP adapter for Words API — Thesaurus. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-synonyms
      description: Get Word Synonyms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: words-thesaurus.getSynonyms
      with:
        word: tools.word
      outputParameters:
      - type: object
        mapping: $.
    - name: get-antonyms
      description: Get Word Antonyms
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: words-thesaurus.getAntonyms
      with:
        word: tools.word
      outputParameters:
      - type: object
        mapping: $.
    - name: get-similar-to
      description: Get Words Similar To
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: words-thesaurus.getSimilarTo
      with:
        word: tools.word
      outputParameters:
      - type: object
        mapping: $.
    - name: get-also
      description: Get Word Also Used
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: words-thesaurus.getAlso
      with:
        word: tools.word
      outputParameters:
      - type: object
        mapping: $.
