naftiko: 1.0.0-alpha2
info:
  label: Words API — Frequency
  description: 'Words API Frequency surface — 1 operations. Lead operation: Get Word Frequency. Self-contained Naftiko capability covering one Words API business surface.'
  tags:
  - Words API
  - Frequency
  created: '2026-05-30'
  modified: '2026-05-30'
binds:
- namespace: env
  keys:
    WORDS_API_KEY: WORDS_API_KEY
capability:
  consumes:
  - type: http
    namespace: words-frequency
    baseUri: https://wordsapiv1.p.rapidapi.com
    description: Words API Frequency business capability. Self-contained, no shared references.
    authentication:
      type: apikey
      key: X-RapidAPI-Key
      value: '{{env.WORDS_API_KEY}}'
      placement: header
    resources:
    - name: word-frequency
      path: /words/{word}/frequency
      operations:
      - name: getFrequency
        method: GET
        description: Get Word Frequency
        inputParameters:
        - name: word
          in: path
          type: string
          required: true
          description: The English word to look up.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: words-frequency-rest
    port: 8080
    description: REST adapter for Words API — Frequency. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/words/{word}/frequency
      name: word-frequency
      description: REST surface for /words/{word}/frequency.
      operations:
      - method: GET
        name: getFrequency
        description: Get Word Frequency
        call: words-frequency.getFrequency
        with:
          word: rest.word
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: words-frequency-mcp
    port: 9090
    transport: http
    description: MCP adapter for Words API — Frequency. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: get-frequency
      description: Get Word Frequency
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: words-frequency.getFrequency
      with:
        word: tools.word
      outputParameters:
      - type: object
        mapping: $.
